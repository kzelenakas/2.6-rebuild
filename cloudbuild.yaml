# UAD 2.6 QC Beta Deployment
steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/legacy26-qdt/uad26-qc-beta:$SHORT_SHA', '.']

  # 2. Push the container image 
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/legacy26-qdt/uad26-qc-beta:$SHORT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'uad26-qc-beta'
      - '--image'
      - 'gcr.io/legacy26-qdt/uad26-qc-beta:$SHORT_SHA'
      - '--region'
      - 'us-east1'
      - '--project'
      - 'legacy26-qdt'

options:
  logging: CLOUD_LOGGING_ONLY